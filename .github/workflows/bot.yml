name: Perk Bot

on:
  issues:
    types: [opened]

jobs:
  reply:
    runs-on: ubuntu-latest

    steps:
      - name: Antwort posten
        uses: actions/github-script@v7
        with:
          script: |
            const perks = ["Dead Hard","Sprint Burst","Bond","Adrenaline"];
            const shuffled = perks.sort(() => 0.5 - Math.random()).slice(0, 4);

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🎲 Dein Build:\n- " + shuffled.join("\n- ")
            });
